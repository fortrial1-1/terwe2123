<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Repository — KCON 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: radial-gradient(ellipse at 35% 40%, #2c2c2c 0%, #141414 45%, #060606 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Ambient orbs */
        .orb {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
        }
        .orb1 {
            width: 520px; height: 520px; top: -120px; left: -140px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            animation: drift1 14s ease-in-out infinite;
        }
        .orb2 {
            width: 600px; height: 600px; bottom: -160px; right: -160px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: drift2 18s ease-in-out infinite;
        }

        @keyframes drift1 {
            0%  { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-30px) translateX(16px); }
            100%{ transform: translateY(0) translateX(0); }
        }
        @keyframes drift2 {
            0%  { transform: translateY(0) translateX(0); }
            50% { transform: translateY(24px) translateX(-20px); }
            100%{ transform: translateY(0) translateX(0); }
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Main card */
        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 520px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 28px;
            padding: 48px 40px 40px;
            box-shadow:
                0 8px 48px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.10),
                inset 0 -1px 0 rgba(255,255,255,0.03);
            animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        /* Shimmer line at top of card */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
            border-radius: 999px;
        }

        /* Header */
        .page-label {
            color: rgba(255,255,255,0.35);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        h1 {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 8px;
        }
        h1 span { color: rgba(255,255,255,0.3); }
        .subtitle {
            color: rgba(255,255,255,0.38);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        /* Divider */
        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.07);
            margin-bottom: 28px;
        }

        /* Download buttons */
        .download-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.09);
            transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease, border-color 0.2s;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .download-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.2s;
        }
        .download-btn:hover { transform: translateY(-4px) scale(1.01); }
        .download-btn:hover::after { opacity: 1; }

        .btn-artist {
            background: linear-gradient(135deg, #1c1c3a 0%, #0f1a35 100%);
            box-shadow: 0 0 0 1px rgba(120,130,255,0.1), 0 4px 20px rgba(0,0,0,0.35);
            animation-delay: 0.08s;
        }
        .btn-artist:hover {
            border-color: rgba(120,130,255,0.35);
            box-shadow: 0 0 0 1px rgba(120,130,255,0.4), 0 14px 36px rgba(80,100,255,0.22);
        }

        .btn-x {
            background: linear-gradient(135deg, #2a1a30 0%, #1a0f28 100%);
            box-shadow: 0 0 0 1px rgba(200,120,255,0.1), 0 4px 20px rgba(0,0,0,0.35);
            animation-delay: 0.14s;
        }
        .btn-x:hover {
            border-color: rgba(200,120,255,0.35);
            box-shadow: 0 0 0 1px rgba(200,120,255,0.4), 0 14px 36px rgba(160,80,255,0.22);
        }

        .btn-mcountdown {
            background: linear-gradient(135deg, #0e2240 0%, #091830 100%);
            box-shadow: 0 0 0 1px rgba(80,160,255,0.1), 0 4px 20px rgba(0,0,0,0.35);
            animation-delay: 0.2s;
        }
        .btn-mcountdown:hover {
            border-color: rgba(80,160,255,0.35);
            box-shadow: 0 0 0 1px rgba(80,160,255,0.4), 0 14px 36px rgba(30,120,255,0.22);
        }

        .btn-label {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .btn-icon-wrap {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.09);
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }
        .btn-text { display: flex; flex-direction: column; gap: 2px; }
        .btn-name { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
        .btn-meta { color: rgba(255,255,255,0.3); font-size: 11px; font-weight: 500; }

        .dl-arrow {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.09);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .dl-arrow svg { width: 14px; height: 14px; stroke: rgba(255,255,255,0.55); }

        /* Footer actions */
        .footer-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 4px;
        }
        .nav-back {
            display: flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            font-size: 13px; font-weight: 500;
            transition: color 0.2s;
        }
        .nav-back:hover { color: rgba(255,255,255,0.7); }
        .nav-back svg { width: 14px; height: 14px; stroke: currentColor; }

        .logout-btn {
            padding: 9px 18px;
            background: rgba(255,59,48,0.12);
            border: 1px solid rgba(255,59,48,0.25);
            color: #f87171;
            font-size: 13px; font-weight: 600;
            border-radius: 10px; cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: rgba(255,59,48,0.22); }

        @media (max-width: 480px) {
            .card { padding: 36px 24px 32px; }
            h1 { font-size: 26px; }
            .btn-name { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="card">
        <p class="page-label">KCON 2026 · Stream Rooms</p>
        <h1>Download<br><span>Repository</span></h1>
        <p class="subtitle">Choose a stage below to access its media folder.</p>

        <div class="divider"></div>

        <div class="download-list">
            <a href="https://www.mediafire.com/folder/tvuvlslpz6l5q/Artist_Stage" target="_blank" class="download-btn btn-artist">
                <div class="btn-label">
                    <div class="btn-icon-wrap">🎤</div>
                    <div class="btn-text">
                        <span class="btn-name">Artist Stage</span>
                        <span class="btn-meta">Mediafire · Folder</span>
                    </div>
                </div>
                <div class="dl-arrow">
                    <svg viewBox="0 0 16 16" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3v7M5 7l3 3 3-3M3 13h10"/>
                    </svg>
                </div>
            </a>

            <a href="https://www.mediafire.com/folder/j47uluqxeftiz/X_Stage" target="_blank" class="download-btn btn-x">
                <div class="btn-label">
                    <div class="btn-icon-wrap">⭐</div>
                    <div class="btn-text">
                        <span class="btn-name">X Stage</span>
                        <span class="btn-meta">Mediafire · Folder</span>
                    </div>
                </div>
                <div class="dl-arrow">
                    <svg viewBox="0 0 16 16" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3v7M5 7l3 3 3-3M3 13h10"/>
                    </svg>
                </div>
            </a>

            <a href="https://www.mediafire.com/folder/o77fimimhrpe6/Mcountdown_Stage" target="_blank" class="download-btn btn-mcountdown">
                <div class="btn-label">
                    <div class="btn-icon-wrap">🏆</div>
                    <div class="btn-text">
                        <span class="btn-name">Mcountdown Stage</span>
                        <span class="btn-meta">Mediafire · Folder</span>
                    </div>
                </div>
                <div class="dl-arrow">
                    <svg viewBox="0 0 16 16" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3v7M5 7l3 3 3-3M3 13h10"/>
                    </svg>
                </div>
            </a>
        </div>

        <div class="footer-actions">
            <a href="index.html" class="nav-back">
                <svg viewBox="0 0 16 16" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 3L5 8l5 5"/>
                </svg>
                Back to Stream Rooms
            </a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        (async function() {
            try {
                const res = await fetch('/api/session', { credentials: 'same-origin' });
                const data = await res.json();
                if (!data.loggedIn) {
                    window.location.replace('index.html?authRequired=1&redirect=downloads.html');
                }
            } catch (e) {
                if (!localStorage.getItem('currentUser')) {
                    window.location.replace('index.html?authRequired=1&redirect=downloads.html');
                }
            }
        })();

        async function logout() {
            try { await fetch('/api/logout', { method: 'POST', credentials: 'same-origin' }); } catch (e) {}
            localStorage.removeItem('currentUser');
            window.location.replace('index.html');
        }
    </script>
</body>
</html>
